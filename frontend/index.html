<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0E7C5A" />
    <title>Ledger — Invoice & Payroll</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply persisted theme synchronously to avoid flash-of-wrong-theme.
      (function () {
        try {
          var stored = localStorage.getItem('theme-preference');
          var theme = stored ? JSON.parse(stored).state.theme : 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
          if (resolved === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          /* no-op */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
